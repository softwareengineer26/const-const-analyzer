<div class="app-container">
  <div class="tab-header">
    <button class="tab-btn" [class.active]="activeTab === 'cost-analyzer'" (click)="setActiveTab('cost-analyzer')">
      Construction Cost Analyzer
    </button>
    <button class="tab-btn" [class.active]="activeTab === 'admin'" (click)="setActiveTab('admin')">
      Admin Page
    </button>
  </div>

  <div class="tab-content">
    <app-cost-grid *ngIf="activeTab === 'cost-analyzer'"></app-cost-grid>
    <app-admin-page *ngIf="activeTab === 'admin'"></app-admin-page>
  </div>
</div>
