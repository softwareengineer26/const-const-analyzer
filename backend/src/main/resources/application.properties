# Server Configuration
server.port=8080

# ============================================
# H2 Database Configuration (Development)
# ============================================
spring.datasource.url=jdbc:h2:file:./data/costtracker_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console - accessible at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================
# Oracle Database Configuration (Production)
# Uncomment below and comment H2 section above
# ============================================
# spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/ORCL
# spring.datasource.driverClassName=oracle.jdbc.OracleDriver
# spring.datasource.username=your_username
# spring.datasource.password=your_password

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For Oracle, use: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# SQL initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# CORS
app.cors.allowed-origins=http://localhost:4200
